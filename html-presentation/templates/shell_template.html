<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded&display=block" rel="stylesheet">
  <style>
    :root {
      --accent: {{ACCENT}};
      --bg: #0a0a0a;
      --text: #ffffff;
      --secondary: #a0a0a0;
      --card: #1a1a1a;
      --border: #2a2a2a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    #deck { position: relative; width: 100vw; height: 100vh; transition: height 0.3s ease; }
    .slide {
      position: absolute; inset: 0; opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: clamp(1.65rem, 4.4vh, 3.85rem) clamp(1.65rem, 5.5vw, 4.4rem);
    }
    .slide.active { opacity: 1; pointer-events: auto; }
    .slide-inner { width: 100%; max-width: min(1320px, 95vw); }
    .slide-inner h2 {
      font-size: clamp(2.75rem, 4.4vw, 4.4rem);
      font-weight: 700; line-height: 1.1; margin-bottom: 1rem;
    }
    .slide-inner h3 {
      font-size: clamp(0.935rem, 1.32vw, 1.1rem);
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 2px; color: var(--accent); margin-bottom: 0.75rem;
    }
    .slide-inner p, .slide-inner li {
      font-size: clamp(1.1rem, 1.76vw, 1.65rem); line-height: 1.6; color: var(--secondary);
    }
    .slide-inner ul, .slide-inner ol { list-style: none; padding: 0; }
    .speaker-notes { display: none; }
    a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--accent); transition: color 0.2s; }
    a:hover { color: var(--accent); }
    @media (prefers-reduced-motion: reduce) {
      .slide { transition: none; }
      #deck { transition: none; }
    }
    #nav {
      position: fixed; bottom: clamp(12px, 2vh, 24px); right: clamp(16px, 2vw, 28px);
      display: flex; align-items: center; gap: 12px;
      background: rgba(26, 26, 26, 0.9); border: 1px solid var(--border);
      border-radius: 999px; padding: 8px 18px;
      font-size: 0.85rem; color: var(--secondary);
      backdrop-filter: blur(8px); z-index: 100;
    }
    .nbtn { cursor: pointer; color: var(--text); font-size: 1rem; padding: 0 4px; transition: color 0.2s; user-select: none; }
    .nbtn:hover { color: var(--accent); }
    #notes-hint { font-size: 0.72rem; color: #555; margin-left: 4px; }
    /* BEGIN_COMPONENT_CSS */
    .anim { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .slide.active .anim { opacity: 1; transform: translateY(0); }
    .stagger > *:nth-child(1) { transition-delay: 0s; }
    .stagger > *:nth-child(2) { transition-delay: 0.1s; }
    .stagger > *:nth-child(3) { transition-delay: 0.2s; }
    .stagger > *:nth-child(4) { transition-delay: 0.3s; }
    .stagger > *:nth-child(5) { transition-delay: 0.4s; }
    .stagger > *:nth-child(6) { transition-delay: 0.5s; }
    @media (prefers-reduced-motion: reduce) {
      .anim, .anim-left, .anim-right { transition: none; opacity: 1; transform: none; }
      .scale-pop.visible { animation: none; opacity: 1; }
      .progress-fill, .ring-fill { transition: none; }
      .draw-line.visible { animation: none; stroke-dashoffset: 0; }
      .pulse-dot::after, .shimmer, .glow-pulse, .tw-cursor, .gradient-bg { animation: none; }
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .gradient-bg {
      background: linear-gradient(135deg, #0a0a0a, #0d1f2d, #0a0a0a, #0d1a10);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }
    .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; width: 100%; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; text-align: center; }
    .icon-list { list-style: none; padding: 0; text-align: left; }
    .icon-list li { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .code-block { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; text-align: left; font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 1rem; line-height: 1.7; color: #e0e0e0; overflow-x: auto; width: 100%; white-space: pre-wrap; }
    .code-block .kw  { color: var(--accent); font-weight: 600; }
    .code-block .str { color: #10B981; }
    .code-block .var { color: #F59E0B; }
    .code-block .cm  { color: #555; font-style: italic; }
    .step-flow { display: flex; align-items: center; gap: 16px; width: 100%; }
    .step-flow .card { flex: 1; text-align: center; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; width: 100%; }
    .comparison-panel { display: grid; grid-template-columns: 1fr auto 1fr; gap: 32px; align-items: start; width: 100%; }
    .chart-h { display: flex; flex-direction: column; gap: 14px; width: 100%; }
    .progress-fill { width: 0; transition: width 1s ease; }
    .progress-fill.visible { width: var(--target-width); }
    .ring-fill { stroke-dasharray: 283; stroke-dashoffset: 283; transition: stroke-dashoffset 1.2s ease; }
    .ring-fill.visible { stroke-dashoffset: var(--target-offset); }
    @property --num { syntax: '<integer>'; initial-value: 0; inherits: false; }
    .counter { --num: 0; transition: --num 1.5s ease; counter-reset: num var(--num); font-variant-numeric: tabular-nums; }
    .counter::after { content: counter(num); }
    .counter.visible { --num: var(--target); }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.8); } }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); position: relative; }
    .pulse-dot::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: inherit; animation: pulse 2s ease-in-out infinite; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .draw-line { stroke-dasharray: 200; stroke-dashoffset: 200; }
    .draw-line.visible { animation: draw 1s ease forwards; }
    .anim-left  { opacity: 0; transform: translateX(-40px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .anim-right { opacity: 0; transform: translateX( 40px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .anim-left.visible, .anim-right.visible { opacity: 1; transform: translateX(0); }
    @keyframes scalePop { 0% { opacity: 0; transform: scale(0.6); } 70% { opacity: 1; transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }
    .scale-pop { opacity: 0; }
    .scale-pop.visible { animation: scalePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes shimmer { to { background-position: 200% center; } }
    .shimmer { background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.07) 50%, var(--card) 75%); background-size: 200% auto; animation: shimmer 1.8s linear infinite; border-radius: 12px; }
    @keyframes borderGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(41,181,232,0); border-color: var(--border); } 50% { box-shadow: 0 0 0 6px rgba(41,181,232,0.25); border-color: var(--accent); } }
    .glow-pulse { border: 1px solid var(--border); border-radius: 16px; animation: borderGlow 2s ease-in-out infinite; }
    @keyframes blinkCaret { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .tw-cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); vertical-align: text-bottom; animation: blinkCaret 0.7s step-end infinite; margin-left: 1px; }
    .tw-pending, .tw-pending span { color: transparent !important; }
    /* END_COMPONENT_CSS */
    /* BEGIN_NOTES_CSS */
    #deck.panel-open { height: calc(100vh - 180px); }
    #notes-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 180px;
      background: #111; border-top: 2px solid var(--accent);
      display: none; flex-direction: column; z-index: 99;
    }
    #notes-panel.open { display: flex; }
    #notes-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px 6px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #notes-panel-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.8px; color: var(--accent); font-weight: 600; }
    #notes-panel-slide { font-size: 0.7rem; color: #555; letter-spacing: 1px; }
    #notes-panel-close { font-size: 0.7rem; color: #555; cursor: pointer; letter-spacing: 1px; transition: color 0.2s; }
    #notes-panel-close:hover { color: #aaa; }
    #notes-panel-body { flex: 1; overflow-y: auto; padding: 12px 20px; }
    #notes-panel-text { font-size: 1rem; line-height: 1.65; color: #d0d0d0; }
    body.panel-open #nav { bottom: calc(180px + clamp(12px, 2vh, 24px)); }
    /* END_NOTES_CSS */
  </style>
</head>
<body>
  <div id="deck">
  <!-- INSERT_SLIDE_1 -->
  </div><!-- end #deck -->
  <div class="counter"></div>
  <div id="nav">
    <span class="nbtn" id="prev">&#8592;</span>
    <span><span id="curr">1</span> / <span id="total">{{SLIDE_COUNT}}</span></span>
    <span class="nbtn" id="next">&#8594;</span>
    <span id="notes-hint">N = notes window &nbsp;&bull;&nbsp; B = notes panel</span>
  </div>
  <!-- BEGIN_NOTES_HTML -->
  <div id="notes-panel">
    <div id="notes-panel-header">
      <span id="notes-panel-label">Speaker Notes</span>
      <span id="notes-panel-slide"></span>
      <span id="notes-panel-close">B = close</span>
    </div>
    <div id="notes-panel-body">
      <div id="notes-panel-text"></div>
    </div>
  </div>
  <!-- END_NOTES_HTML -->
  <script>
    const slides = Array.from(document.querySelectorAll('.slide'));
    let current = 0;
    // BEGIN_NOTES_JS
    let notesWin = null;
    let panelOpen = false;

    function updateNotesWindow() {
      if (!notesWin || notesWin.closed) return;
      const notes = slides[current].querySelector('.speaker-notes');
      const text = notes ? notes.textContent : '';
      notesWin.document.getElementById('noteText').textContent = text;
      notesWin.document.getElementById('noteSlide').textContent =
        'Slide ' + (current + 1) + ' of ' + slides.length;
    }

    function updateNotesPanel() {
      if (!panelOpen) return;
      const notes = slides[current].querySelector('.speaker-notes');
      const text = notes ? notes.textContent.trim() : '(no notes)';
      document.getElementById('notes-panel-text').textContent = text;
      document.getElementById('notes-panel-slide').textContent =
        'Slide ' + (current + 1) + ' of ' + slides.length;
    }

    function openNotesPanel() {
      if (notesWin && !notesWin.closed) { notesWin.close(); notesWin = null; }
      panelOpen = true;
      document.getElementById('notes-panel').classList.add('open');
      document.getElementById('deck').classList.add('panel-open');
      document.body.classList.add('panel-open');
      updateNotesPanel();
    }

    function closeNotesPanel() {
      panelOpen = false;
      document.getElementById('notes-panel').classList.remove('open');
      document.getElementById('deck').classList.remove('panel-open');
      document.body.classList.remove('panel-open');
    }

    function openNotesWindow() {
      if (panelOpen) closeNotesPanel();
      if (notesWin && !notesWin.closed) { notesWin.focus(); return; }
      notesWin = window.open('', 'speaker_notes',
        'width=520,height=360,left=100,top=100');
      notesWin.document.write(`<!DOCTYPE html><html><head>
        <title>Speaker Notes</title><style>
        body{background:#111;color:#e0e0e0;
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',
          Helvetica,Arial,sans-serif;padding:28px 32px;margin:0;}
        #noteSlide{font-size:0.8125rem;text-transform:uppercase;
          letter-spacing:1.5px;color:var(--accent,#3B82F6);
          margin-bottom:16px;font-weight:600;}
        #noteText{font-size:1.25rem;line-height:1.65;color:#d0d0d0;}
        .hint{position:fixed;bottom:16px;right:20px;
          font-size:0.75rem;color:#555;}
        </style></head><body>
        <div id="noteSlide"></div>
        <div id="noteText"></div>
        <div class="hint">Navigate from main window</div>
      </body></html>`);
      notesWin.document.close();
      updateNotesWindow();
    }

    document.getElementById('notes-panel-close').addEventListener('click', closeNotesPanel);
    // END_NOTES_JS

    const ANIM_SEL = '.anim-left,.anim-right,.scale-pop,.draw-line,.progress-fill,.ring-fill,.counter,.typewriter';
    function show(n) {
      const prev = current;
      slides[prev].classList.remove('active');
      slides[prev].querySelectorAll(ANIM_SEL).forEach(el => el.classList.remove('visible'));
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      requestAnimationFrame(() =>
        slides[current].querySelectorAll(ANIM_SEL).forEach(el => el.classList.add('visible'))
      );
      document.getElementById('curr').textContent = current + 1;
      // BEGIN_SHOW_UPDATES
      updateNotesWindow();
      updateNotesPanel();
      // END_SHOW_UPDATES
    }

    document.getElementById('prev').addEventListener('click', () => show(current - 1));
    document.getElementById('next').addEventListener('click', () => show(current + 1));

    document.addEventListener('keydown', e => {
      switch(e.key) {
        case 'ArrowRight': case 'ArrowDown': show(current+1); break;
        case 'ArrowLeft':  case 'ArrowUp':   show(current-1); break;
        // BEGIN_NOTES_KEYS
        case 'n': case 'N': openNotesWindow(); break;
        case 'b': case 'B': if(panelOpen) closeNotesPanel(); else openNotesPanel(); break;
        // END_NOTES_KEYS
      }
    });
    document.getElementById('total').textContent = slides.length;
    show(0);
  </script>
</body>
</html>
